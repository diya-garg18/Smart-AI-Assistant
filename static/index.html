<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Assistant | Your Document Intelligence</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>Smart AI Assistant</h1>
            </div>
            <div class="status-badge" id="backend-status">
                <span class="status-dot"></span>
                <span id="status-text">Checking Backend...</span>
            </div>
        </header>

        <main>
            <section class="upload-section glass">
                <div class="section-header">
                    <h2><i class="fas fa-file-upload"></i> Knowledge Base</h2>
                    <button id="reset-btn" class="btn-icon" title="Clear All Documents">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
                
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Drag & drop files here or <span>browse</span></p>
                        <small>Supports PDF, DOCX, TXT, PPTX</small>
                    </div>
                    <input type="file" id="file-input" multiple hidden>
                </div>

                <div id="file-list" class="file-list">
                    <!-- Files will be listed here -->
                </div>
            </section>

            <section class="chat-section glass">
                <div class="chat-header">
                    <h2><i class="fas fa-comment-dots"></i> Ask Anything</h2>
                </div>
                
                <div id="chat-container" class="chat-container">
                    <div class="welcome-message">
                        <i class="fas fa-robot"></i>
                        <p>Hello! Upload your documents and ask me anything about them. I'll provide answers based strictly on your content.</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="question-input" placeholder="Type your question..." autocomplete="off">
                        <button id="send-btn" class="btn-primary">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification system -->
    <div id="notification-container" class="notification-container"></div>

    <script src="static/script.js"></script>
</body>
</html>
